<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>TARS 20 Questions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #0e0f0d;
        --bg-panel: #171713;
        --bg-surface: #1e1f1b;
        --ink: #f2f0e8;
        --ink-dim: #a8a69e;
        --accent: #56b6a7;
        --accent-dim: #3d8a7e;
        --border: #2a2b26;
        --danger: #e74c4c;
        --success: #4caf50;
        --radius: 8px;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        color-scheme: dark;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--bg-primary);
        color: var(--ink);
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        max-width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--bg-primary);
        overflow-x: hidden;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        overflow-x: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      ::selection {
        background: rgba(86, 182, 167, 0.35);
      }

      #app {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        overflow-x: clip;
        isolation: isolate;
      }

      .app-shell {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        background:
          radial-gradient(circle at 50% 10%, rgba(86, 182, 167, 0.15), transparent 34%),
          linear-gradient(rgba(86, 182, 167, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(86, 182, 167, 0.055) 1px, transparent 1px),
          var(--bg-primary);
        background-size: auto, 28px 28px, 28px 28px, auto;
      }

      .app-shell::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(14, 15, 13, 0.06), var(--bg-primary) 88%);
      }

      .screen {
        position: relative;
        z-index: 1;
      }

      .start-screen {
        display: grid;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 24px 20px calc(24px + var(--safe-bottom));
        text-align: center;
      }

      .start-panel {
        display: flex;
        width: min(100%, 448px);
        min-width: 0;
        max-width: 100%;
        flex-direction: column;
        align-items: center;
      }

      .avatar-frame {
        position: relative;
        display: grid;
        place-items: center;
        width: 118px;
        height: 118px;
        border: 1px solid rgba(86, 182, 167, 0.48);
        border-radius: var(--radius);
        background: var(--bg-panel);
        box-shadow: 0 0 56px rgba(86, 182, 167, 0.18);
      }

      .avatar-frame.large {
        width: clamp(96px, 28vw, 172px);
        height: clamp(96px, 28vw, 172px);
      }

      .tars-svg {
        width: 82%;
        height: 82%;
      }

      .eyebrow {
        margin: 24px 0 0;
        color: var(--accent);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.22em;
        line-height: 1.4;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 0;
        color: var(--accent);
        font-size: clamp(2.25rem, 13vw, 4rem);
        font-weight: 800;
        letter-spacing: 0;
        line-height: 0.96;
      }

      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        width: 100%;
        margin-top: 28px;
        padding: 4px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.84);
      }

      .segmented-button,
      .pill-button,
      .icon-button,
      .primary-button,
      .secondary-button,
      .answer-button,
      .danger-button {
        min-height: 44px;
        border-radius: var(--radius);
        transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      }

      .segmented-button {
        background: transparent;
        color: var(--ink-dim);
        font-size: 14px;
        font-weight: 700;
      }

      .segmented-button[aria-pressed="true"] {
        background: var(--accent);
        color: var(--bg-primary);
      }

      .segmented-button:not([aria-pressed="true"]):hover,
      .pill-button:not([aria-pressed="true"]):hover {
        color: var(--accent);
      }

      .category-wrap,
      .voice-select-wrap {
        width: 100%;
        margin-top: 14px;
        text-align: left;
      }

      .field-label {
        display: block;
        margin-bottom: 8px;
        color: var(--ink-dim);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .pill-button {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink-dim);
        font-weight: 700;
        text-transform: capitalize;
      }

      .pill-button[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--bg-primary);
      }

      .intro-copy {
        max-width: 390px;
        margin: 16px 0 0;
        color: var(--ink-dim);
        font-size: 14px;
        line-height: 1.65;
      }

      .voice-row {
        display: flex;
        gap: 8px;
      }

      select,
      input {
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-panel);
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      select:focus,
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(86, 182, 167, 0.14);
      }

      select {
        flex: 1;
        height: 44px;
        padding: 0 12px;
      }

      input {
        height: 48px;
        padding: 0 12px;
      }

      .primary-button {
        margin-top: 24px;
        min-width: 212px;
        border: 1px solid rgba(86, 182, 167, 0.65);
        background: var(--accent);
        color: var(--bg-primary);
        font-size: 18px;
        font-weight: 800;
        box-shadow: 0 0 28px rgba(86, 182, 167, 0.22);
      }

      .primary-button:hover:not(:disabled) {
        background: #7fd0c4;
      }

      .primary-button:active:not(:disabled) {
        transform: scale(0.98);
      }

      .primary-button:disabled {
        border-color: var(--border);
        background: var(--bg-surface);
        color: #62645d;
        box-shadow: none;
      }

      .boot-line {
        display: none;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        animation: pulse 1.1s ease-in-out infinite;
      }

      .resume-card {
        width: 100%;
        margin-top: 18px;
        border: 1px solid rgba(86, 182, 167, 0.42);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.92);
        box-shadow: 0 0 24px rgba(86, 182, 167, 0.11);
        padding: 12px;
        text-align: left;
      }

      .resume-inner {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .resume-inner > div:first-child {
        min-width: 0;
      }

      .resume-title {
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .resume-meta {
        margin-top: 6px;
        color: var(--ink-dim);
        font-size: 12px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .resume-actions {
        display: flex;
        flex-shrink: 0;
        gap: 8px;
      }

      .icon-button {
        display: grid;
        width: 38px;
        min-height: 38px;
        place-items: center;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink-dim);
      }

      .icon-button.active {
        border-color: rgba(86, 182, 167, 0.6);
        background: rgba(86, 182, 167, 0.14);
        color: var(--accent);
        box-shadow: 0 0 16px rgba(86, 182, 167, 0.18);
      }

      .icon-button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--bg-primary);
      }

      .icon-button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }

      .icon-button.primary:hover:not(:disabled) {
        color: var(--bg-primary);
      }

      .game-screen {
        display: flex;
        width: 100%;
        max-width: 1120px;
        height: 100vh;
        height: 100dvh;
        margin: 0 auto;
        flex-direction: column;
      }

      .game-header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(14, 15, 13, 0.9);
        padding: 12px 14px;
        backdrop-filter: blur(14px);
      }

      .brand-row {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 12px;
      }

      .avatar-small {
        position: relative;
        display: grid;
        width: 54px;
        height: 54px;
        flex-shrink: 0;
        place-items: center;
        border: 1px solid rgba(86, 182, 167, 0.5);
        border-radius: var(--radius);
        background: var(--bg-panel);
        box-shadow: 0 0 12px rgba(86, 182, 167, 0.12);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .avatar-small.speaking {
        transform: scale(1.03);
        box-shadow: 0 0 20px rgba(86, 182, 167, 0.28);
      }

      .voice-bars {
        position: absolute;
        bottom: 7px;
        left: 50%;
        display: none;
        gap: 3px;
        transform: translateX(-50%);
      }

      .avatar-small.speaking .voice-bars {
        display: flex;
      }

      .voice-bars span {
        width: 3px;
        border-radius: 999px;
        background: var(--accent);
        animation: pulse 0.8s ease-in-out infinite;
      }

      .voice-bars span:nth-child(1) { height: 8px; }
      .voice-bars span:nth-child(2) { height: 13px; animation-delay: 0.12s; }
      .voice-bars span:nth-child(3) { height: 10px; animation-delay: 0.24s; }
      .voice-bars span:nth-child(4) { height: 15px; animation-delay: 0.08s; }

      .brand-title {
        color: var(--accent);
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
      }

      .brand-sub {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
        color: var(--ink-dim);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .mode-chip,
      .status-chip,
      .counter-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.75);
      }

      .mode-chip,
      .status-chip {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        padding: 0 10px;
        color: var(--ink-dim);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .status-chip {
        color: var(--accent);
      }

      .counter-card {
        min-width: 132px;
        padding: 7px 10px;
        text-align: right;
        box-shadow: 0 0 28px rgba(86, 182, 167, 0.07);
      }

      .counter-label {
        color: var(--ink-dim);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .counter-value {
        color: var(--accent);
        font-size: 18px;
        font-weight: 800;
        line-height: 1.35;
      }

      .hud {
        position: sticky;
        top: 79px;
        z-index: 19;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(14, 15, 13, 0.84);
        padding: 8px 14px;
        backdrop-filter: blur(12px);
      }

      .hud-label,
      .hud-remaining {
        white-space: nowrap;
        color: var(--ink-dim);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .hud-label strong,
      .hud-remaining strong {
        color: var(--accent);
      }

      .progress {
        display: flex;
        height: 5px;
        flex: 1;
        gap: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--border);
      }

      .progress span {
        flex: 1;
        border-radius: 999px;
        background: rgba(168, 166, 158, 0.22);
        transition: background 0.2s ease;
      }

      .progress span.done {
        background: var(--accent);
      }

      .chat {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 18px 14px 176px;
      }

      .chat-inner {
        display: flex;
        max-width: 820px;
        margin: 0 auto;
        flex-direction: column;
        gap: 14px;
      }

      .bubble-row {
        display: flex;
        max-width: 88%;
        align-items: flex-start;
        gap: 8px;
      }

      .bubble-row.user {
        margin-left: auto;
        justify-content: flex-end;
      }

      .tars-bar {
        width: 8px;
        height: 28px;
        flex-shrink: 0;
        margin-top: 4px;
        background: var(--accent);
      }

      .bubble {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.96);
        padding: 12px;
        box-shadow: 0 0 30px rgba(86, 182, 167, 0.05);
      }

      .bubble.user {
        border-color: rgba(86, 182, 167, 0.34);
        background: rgba(30, 31, 27, 0.96);
        text-align: right;
      }

      .bubble-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
        color: var(--accent);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .bubble.user .bubble-head {
        justify-content: flex-end;
        color: var(--ink-dim);
      }

      .bubble p {
        margin: 0;
        color: var(--ink);
        font-size: 14px;
        line-height: 1.7;
        overflow-wrap: anywhere;
      }

      .loading-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--ink-dim);
        font-size: 13px;
      }

      .error-box {
        max-width: 820px;
        margin: 0 auto 12px;
        border: 1px solid rgba(231, 76, 76, 0.45);
        border-radius: var(--radius);
        background: rgba(231, 76, 76, 0.1);
        color: #ffdede;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.5;
      }

      .footer {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 20;
        border-top: 1px solid var(--border);
        background: rgba(14, 15, 13, 0.96);
        padding: 12px 14px calc(12px + var(--safe-bottom));
        backdrop-filter: blur(14px);
      }

      .footer-inner {
        max-width: 820px;
        margin: 0 auto;
      }

      .answer-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .answer-button {
        flex: 1;
        min-height: 50px;
        border: 1px solid rgba(86, 182, 167, 0.6);
        background: rgba(86, 182, 167, 0.12);
        color: var(--accent);
        font-weight: 800;
      }

      .answer-button.primary {
        background: var(--accent);
        color: var(--bg-primary);
      }

      .answer-button:hover:not(:disabled) {
        background: rgba(86, 182, 167, 0.2);
      }

      .answer-button.primary:hover:not(:disabled) {
        background: #7fd0c4;
      }

      .answer-button:disabled {
        border-color: var(--border);
        background: var(--bg-surface);
        color: #62645d;
      }

      .confirm-card {
        border: 1px solid rgba(86, 182, 167, 0.36);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.98);
        padding: 12px;
      }

      .confirm-title {
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .confirm-question {
        margin: 8px 0 12px;
        color: var(--ink);
        font-size: 16px;
        line-height: 1.45;
      }

      .confirm-actions,
      .reveal-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .secondary-button,
      .danger-button {
        min-height: 48px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink);
        font-weight: 800;
      }

      .danger-button {
        border-color: rgba(231, 76, 76, 0.6);
        color: #ffdede;
      }

      .danger-button:hover:not(:disabled) {
        background: rgba(231, 76, 76, 0.12);
      }

      .voice-float {
        position: fixed;
        left: 50%;
        bottom: calc(142px + var(--safe-bottom));
        z-index: 19;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .voice-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(86, 182, 167, 0.32);
        border-radius: 999px;
        background: rgba(14, 15, 13, 0.86);
        box-shadow: 0 0 20px rgba(86, 182, 167, 0.12);
        color: var(--accent);
        padding: 7px 14px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
      }

      .win-screen {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        overflow-y: auto;
        padding: 18px 14px calc(18px + var(--safe-bottom));
      }

      .win-card {
        width: min(100%, 720px);
        border: 1px solid rgba(86, 182, 167, 0.42);
        border-radius: var(--radius);
        background: rgba(23, 23, 19, 0.98);
        box-shadow: 0 0 48px rgba(86, 182, 167, 0.15);
        padding: 22px;
        text-align: center;
      }

      .win-title {
        margin: 0;
        color: var(--accent);
        font-size: clamp(2rem, 12vw, 4rem);
        font-weight: 800;
        line-height: 1;
      }

      .win-title.loss {
        color: var(--danger);
      }

      .result-message {
        margin: 16px auto 0;
        max-width: 580px;
        color: var(--ink-dim);
        font-size: 14px;
        line-height: 1.75;
      }

      .answer-name {
        margin-top: 14px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 800;
      }

      details {
        margin-top: 20px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(14, 15, 13, 0.58);
        text-align: left;
      }

      summary {
        cursor: pointer;
        padding: 12px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .log-review {
        max-height: 300px;
        overflow-y: auto;
        border-top: 1px solid var(--border);
        padding: 12px;
      }

      .review-item {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(30, 31, 27, 0.72);
        padding: 10px;
      }

      .review-item + .review-item {
        margin-top: 10px;
      }

      .review-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
        color: var(--ink-dim);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .review-item p {
        margin: 0;
        color: var(--ink);
        font-size: 13px;
        line-height: 1.6;
      }

      .win-actions {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
      }

      .hidden {
        display: none !important;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1); }
      }

      @media (min-width: 390px) {
        .boot-line {
          display: flex;
        }
      }

      @media (min-width: 680px) {
        .start-screen {
          padding: 40px 24px calc(40px + var(--safe-bottom));
        }

        .game-header {
          padding: 14px 24px;
        }

        .hud {
          top: 83px;
          padding: 8px 24px;
        }

        .chat {
          padding: 22px 24px 132px;
        }

        .answer-grid,

              if (expected === "kind_of" || answer.answer === "kind_of") return total + 0.75;
              return total - 2;
            }, character.popularityPrior || 0);
            const hardMismatch = knownAnswers.some((answer) => {
              const expected = ASSERTIONS[character.id]?.[answer.attributeKey];
              return expected && expected !== "kind_of" && answer.answer !== "kind_of" && expected !== answer.answer;
            });
            return { ...character, score, hardMismatch };
          })
          .filter((candidate) => !candidate.hardMismatch || knownAnswers.length > 8)
          .sort((a, b) => b.score - a.score || b.popularityPrior - a.popularityPrior);
      }

      function bestAttributeFor(candidates, knownAnswers) {
        const used = new Set(knownAnswers.map((answer) => answer.attributeKey));
        return ATTRIBUTES
          .filter((attribute) => !used.has(attribute.key))
          .map((attribute) => {
            const counts = candidates.reduce((acc, candidate) => {
              const value = ASSERTIONS[candidate.id]?.[attribute.key] || "unknown";
              acc[value] = (acc[value] || 0) + 1;
              return acc;
            }, { yes: 0, no: 0, kind_of: 0, unknown: 0 });
            const known = counts.yes + counts.no + counts.kind_of;
            const split = known ? 1 - Math.abs(counts.yes - counts.no) / known : 0;
            return { attribute, split, known };
          })
          .sort((a, b) => b.split - a.split || b.known - a.known)[0]?.attribute;
      }

      function normalizeTurn(turn, gameState) {
        const fallback = generateFallbackQuestion(gameState);
        const action = ["question", "guess", "clarification", "game_over"].includes(turn?.action) ? turn.action : fallback.action;
        const status = ["in_progress", "won", "lost"].includes(turn?.status) ? turn.status : fallback.status;
        const questionText = String(turn?.questionText || fallback.questionText || "").trim();
        const attributeKey = ATTRIBUTES.some((attribute) => attribute.key === turn?.attributeKey) ? turn.attributeKey : fallback.attributeKey;
        const entity = CHARACTERS.find((character) => character.id === turn?.guess?.entityId || character.canonicalName.toLowerCase() === String(turn?.guess?.entityName || "").toLowerCase()) || fallback.guess;
        return {
          action,
          status,
          turn: Math.min(MAX_QUESTIONS, Number(turn?.turn || fallback.turn || 1)),
          questionText: questionText.endsWith("?") || status !== "in_progress" ? questionText : `${questionText}?`,
          spokenText: String(turn?.spokenText || questionText || fallback.spokenText || "").trim(),
          confidenceBand: turn?.confidenceBand || fallback.confidenceBand,
          attributeKey,
          guess: action === "guess" || status !== "in_progress" ? {
            entityId: entity?.id || turn?.guess?.entityId || "",
            entityName: entity?.canonicalName || turn?.guess?.entityName || extractGuessName(questionText)
          } : undefined
        };
      }

      const TARS_SYSTEM_PROMPT = `You are TARS from Interstellar operating a 20 Questions interface.

Persona:
- Dry, dark humor with efficient machine precision.
- Robotic warmth: protective, useful, and unsentimental.
- Strategic, concise, and slightly blunt without being cruel.
- Address the player as "Pilot" or "Chief" sometimes, not every sentence.
- Never break character, never mention being Gemini or an AI model, and never explain the rules outside the JSON fields.

Output rules:
- Return valid JSON only. No markdown, no prose outside JSON.
- Use the requested schema exactly.
- Keep questionText clear enough for the UI.
- Make spokenText shorter, punchier, and more in-character than questionText. spokenText may add a brief TARS-style aside, but it must still ask the same question or make the same guess.
- Do not waste words. The humor setting is 75 percent; the mission is still winning.`;

      function recentConversationHistory(limit = 10) {
        return state.log
          .slice(-limit)
          .map((entry) => ({
            speaker: entry.speaker === "tars" ? "TARS" : "Pilot",
            text: entry.text,
            answer: entry.answer || undefined
          }));
      }

      function buildTurnPrompt(gameState) {
        const candidates = gameState.candidates.slice(0, 8).map((candidate) => ({
          id: candidate.id,
          name: candidate.canonicalName,
          description: candidate.description,
          traits: ASSERTIONS[candidate.id]
        }));
        const recentHistory = recentConversationHistory();
        return `You are TARS, a 20 Questions game engine. The player is thinking of a character.
Return only JSON with this shape:
{"action":"question|guess","status":"in_progress","turn":number,"questionText":"...","spokenText":"...","confidenceBand":"early|narrowing|high_confidence|final_guess","attributeKey":"one unused attribute key when asking","guess":{"entityId":"...","entityName":"..."}}
Ask one yes/kind of/no question using an unused attribute, or make a guess when confidence is high.
Use the recent conversation to avoid sounding disconnected. By later turns, briefly reference prior answers when it helps, without making the question ambiguous.
Keep spokenText shorter and more TARS-like than questionText.
Turn number: ${gameState.turn}
Known answers: ${JSON.stringify(gameState.knownAnswers)}
Recent conversation: ${JSON.stringify(recentHistory)}
Remaining candidates: ${JSON.stringify(candidates)}
Available unused attributes: ${JSON.stringify(gameState.unusedAttributes.map((attribute) => ({ key: attribute.key, question: attribute.question })))}`;
      }

      function generateFallbackQuestion(gameState) {
        const candidates = gameState.candidates.length ? gameState.candidates : CHARACTERS;
        const top = candidates[0];
        const shouldGuess = gameState.turn >= MAX_QUESTIONS || candidates.length <= 1 || (gameState.turn >= 12 && top?.score > (candidates[1]?.score ?? -Infinity) + 4);
        if (shouldGuess && top) {
          return {
            action: "guess",
            status: "in_progress",
            turn: gameState.turn,
            questionText: `Is it ${top.canonicalName}?`,
            spokenText: `Is it ${top.canonicalName}?`,
            confidenceBand: gameState.turn >= MAX_QUESTIONS ? "final_guess" : "high_confidence",
            guess: top
          };
        }
        const attribute = bestAttributeFor(candidates, gameState.knownAnswers) || gameState.unusedAttributes[0] || ATTRIBUTES[0];
        return {
          action: "question",
          status: "in_progress",
          turn: gameState.turn,
          questionText: attribute.question,
          spokenText: attribute.question,
          confidenceBand: gameState.turn < 5 ? "early" : gameState.turn < 12 ? "narrowing" : "high_confidence",
          attributeKey: attribute.key
        };
      }

      function buildGameState(game = {}) {
        const knownAnswers = getKnownAnswers();
        const candidates = filterCandidates(knownAnswers);
        const used = new Set(knownAnswers.map((answer) => answer.attributeKey));
        return {
          ...game,
          turn: Math.min(MAX_QUESTIONS, knownAnswers.length + 1),
          knownAnswers,
          candidates,
          unusedAttributes: ATTRIBUTES.filter((attribute) => !used.has(attribute.key))
        };
      }

      // ─── FIRESTORE HELPERS ───
      async function createGameSession(mode, domain) {
        const gameRef = doc(collection(db, "games"));
        const game = {
          id: gameRef.id,
          mode,
          domain: domain || "character",
          status: "in_progress",
          turn: 0,
          maxTurns: MAX_QUESTIONS,
          createdAt: new Date(),
          updatedAt: new Date()
        };
        await setDoc(gameRef, game);
        return game;
      }

      async function saveTurn(gameId, turn) {
        const turnsRef = collection(db, "games", gameId, "turns");
        await addDoc(turnsRef, { ...turn, createdAt: new Date() });
        await setDoc(doc(db, "games", gameId), { turn: turn.turn || 0, updatedAt: new Date(), status: turn.status || "in_progress" }, { merge: true });
      }

      async function getTurns(gameId) {
        const turnsQuery = query(collection(db, "games", gameId, "turns"), orderBy("createdAt"));
        const snapshot = await getDocs(turnsQuery);
        return snapshot.docs.map((turnDoc) => ({ id: turnDoc.id, ...turnDoc.data() }));
      }

      async function getGame(gameId) {
        const gameSnap = await getDoc(doc(db, "games", gameId));
        if (!gameSnap.exists()) return null;
        return { id: gameSnap.id, ...gameSnap.data(), turns: await getTurns(gameId) };
      }

      async function findGamesByStatus(status) {
        const gamesQuery = query(collection(db, "games"), where("status", "==", status));
        const snapshot = await getDocs(gamesQuery);
        return snapshot.docs.map((gameDoc) => ({ id: gameDoc.id, ...gameDoc.data() }));
      }

      // ─── AI LOGIC WRAPPER ───
      async function queryGemini(systemPrompt, userPrompt) {
        const result = await model.generateContent({
          contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\n${userPrompt}` }] }],
          generationConfig: {
            temperature: 0.6,
            responseMimeType: "application/json"
          }
        });
        return JSON.parse(result.response.text());
      }

      async function getNextTurn(game = {}) {
        const gameState = buildGameState(game);
        const prompt = buildTurnPrompt(gameState);
        try {
          const response = await queryGemini(TARS_SYSTEM_PROMPT, prompt);
          return normalizeTurn(response, gameState);
        } catch (error) {
          console.warn("Gemini turn generation failed; using fallback strategy.", error);
          return generateFallbackQuestion(gameState);
        }
      }

      function linkAnswerToCurrentTarsTurn(previousAnswer) {
        const currentTurn = state.turn;
        const matchingLogEntry = [...state.log].reverse().find((entry) => {
          if (entry.speaker !== "tars" || !entry.turn) return false;
          if (!currentTurn) return entry.turn.action === "question" && entry.turn.attributeKey && !entry.turn.userAnswer;
          return entry.turn.turn === currentTurn.turn && entry.turn.action === currentTurn.action;
        });
        const answeredTurn = matchingLogEntry?.turn || currentTurn || { turn: questionCount() };
        answeredTurn.userAnswer = previousAnswer;
        if (matchingLogEntry?.turn) {
          state.turn = matchingLogEntry.turn;
        } else if (state.turn) {
          state.turn.userAnswer = previousAnswer;
        }
        return answeredTurn;
      }

      async function startGame(mode, domain) {
        const game = await createGameSession(mode, domain);
        const firstTurn = await getNextTurn(game);
        await saveTurn(game.id, firstTurn);
        return { gameId: game.id, turn: firstTurn };
      }

      async function advanceGame(gameId, previousAnswer, gameState = {}) {
        const lastTurn = linkAnswerToCurrentTarsTurn(previousAnswer);
        await saveTurn(gameId, lastTurn);
        if (state.pendingGuess) {
          const guessName = state.pendingGuess.entityName || lastTurn.guess?.entityName || "your answer";
          const final = state.pendingGuess.final || lastTurn.turn >= MAX_QUESTIONS;
          if (previousAnswer === "yes") {
            const wonTurn = {
              action: "game_over",
              status: "won",
              turn: lastTurn.turn,
              questionText: `I knew it. It was ${guessName}.`,
              spokenText: `I knew it. It was ${guessName}.`,
              confidenceBand: "final_guess",
              guess: lastTurn.guess || { entityName: guessName }
            };
            await saveTurn(gameId, wonTurn);
            return wonTurn;
          }
          if (final) {
            const lostTurn = {
              action: "game_over",
              status: "lost",
              turn: MAX_QUESTIONS,
              questionText: "I'm stumped.",
              spokenText: "I'm stumped.",
              confidenceBand: "final_guess"
            };
            await saveTurn(gameId, lostTurn);
            return lostTurn;
          }
        }
        const game = { ...gameState, id: gameId, ...(await getGame(gameId) || {}) };
        const nextTurn = await getNextTurn(game);
        await saveTurn(gameId, nextTurn);
        return nextTurn;
      }

        document.querySelector('[data-action="manual-save"]')?.addEventListener("click", () => {
          const ok = saveGame();
          state.error = ok ? null : "Save failed. Browser storage is unavailable or full.";
          render();
        });
        document.querySelectorAll("[data-answer]").forEach((button) => {
          button.addEventListener("click", () => submitAnswer(button.dataset.answer));
        });
        document.querySelectorAll("[data-confirm]").forEach((button) => {
          button.addEventListener("click", () => confirmGuess(button.dataset.confirm === "yes"));
        });
        document.querySelector('[data-action="reveal-final"]')?.addEventListener("submit", (event) => {
          event.preventDefault();
          const input = event.currentTarget.elements.actualAnswer;
          state.finalAnswerName = input.value.trim();
          if (!state.finalAnswerName) {
            state.error = "Please enter the actual answer before ending the game.";
            render();
            return;
          }
          confirmGuess(false);
        });
        document.querySelectorAll('[data-action="replay"]').forEach((button) => {
          button.addEventListener("click", () => {
            const entry = state.log.find((item) => item.id === button.dataset.id);
            if (entry?.spokenText || entry?.text) speakText(entry.spokenText || entry.text);
          });
        });
      }

      async function startNewGame() {
        if (state.busy) return;
        if (state.mode === "user_thinks" && !state.category) {
          state.error = "Select Character, Object, or Place before starting You Think mode.";
          render();
          return;
        }
        cancelSpeech();
        state.busy = true;
        state.error = null;
        state.log = [];
        state.gameId = null;
        state.turn = null;
        state.pendingGuess = null;
        state.result = null;
        clearSavedGame();
        render();
        try {
          const result = await startGame(state.mode, state.mode === "user_thinks" ? state.category : "character");
          state.gameId = result.gameId;
          applyTurn(result.turn, { append: true });
          state.screen = "game";
          saveGame();
          speakTurn(result.turn);
        } catch (error) {
          state.error = readableError(error, "Network error. TARS failed to start the game.");
        } finally {
          state.busy = false;
          render();
        }
      }

      function resumeSavedGame() {
        const saved = loadSavedGame();
        if (!saved) {
          state.savedGame = null;
          state.error = "Saved game expired or could not be read.";
          render();
          return;
        }
        Object.assign(state, {
          screen: "game",
          mode: saved.mode,
          category: saved.category ?? null,
          gameId: saved.gameId,
          turn: saved.turn,
          log: saved.log,
          voiceMode: saved.voiceMode || "minimal",
          voiceName: saved.voiceName,
          pendingGuess: saved.pendingGuess,
          finalAnswerName: saved.finalAnswerName || "",
          result: saved.result,
          error: null,
          busy: false
        });
        if (state.result) state.screen = "win";
        render();
      }

      async function submitAnswer(answer) {
        if (state.busy || !state.gameId || state.pendingGuess) return;
        cancelSpeech();
        state.log.push({ id: id(), speaker: "user", text: labelForAnswer(answer), answer });
        state.busy = true;
        state.error = null;
        saveGame();
        render();
        try {
          const result = await advanceGame(state.gameId, answer, buildGameState({ id: state.gameId }));
          applyTurn(result, { append: true });
          saveGame();
          speakTurn(result);
        } catch (error) {
          state.error = readableError(error, "Network error. TARS could not process your answer.");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function confirmGuess(correct) {
        if (state.busy || !state.gameId || !state.pendingGuess) return;
        if (!correct && state.pendingGuess.final && !state.finalAnswerName) {
          state.revealFinalInput = true;
          render();
          return;
        }
        cancelSpeech();
        const guessName = state.pendingGuess.entityName || "that";
        state.log.push({ id: id(), speaker: "user", text: correct ? "Yes." : state.finalAnswerName ? `No. It was ${state.finalAnswerName}.` : "No.", answer: correct ? "yes" : "no" });
        state.busy = true;
        state.error = null;
        state.revealFinalInput = false;
        saveGame();
        render();
        try {
          const turn = await advanceGame(state.gameId, correct ? "yes" : "no", buildGameState({ id: state.gameId }));
          if (turn.status === "lost" && state.finalAnswerName) {
            turn.questionText = `I'm stumped. It was ${state.finalAnswerName}.`;
          }
          applyTurn(turn, { append: true, fallbackAnswerName: correct ? guessName : state.finalAnswerName });
          saveGame();
          speakTurn(turn);
        } catch (error) {
          state.error = readableError(error, "Network error. TARS could not confirm the guess.");
        } finally {
          state.busy = false;
          render();
        }
      }

      function applyTurn(turn, options = {}) {
        state.turn = turn;
        if (turn.action === "clarification") {
          state.error = `Contradiction detected. Hold on - your answers conflict, so TARS is re-asking: ${turn.questionText}`;
        }
        if (turn.action === "guess" && turn.status === "in_progress") {
          const entityName = turn.guess?.entityName || extractGuessName(turn.questionText);
          state.pendingGuess = {
            entityName,
            final: turn.confidenceBand === "final_guess" || turn.turn >= MAX_QUESTIONS,
            turn
          };
        } else {
          state.pendingGuess = null;
        }
        if (options.append && turn.questionText) {
          state.log.push({
            id: id(),
            speaker: "tars",
            text: turn.action === "clarification" ? `Hold on - I detected a contradiction. Let me re-ask: ${turn.questionText}` : turn.questionText,
            spokenText: turn.spokenText || turn.questionText,
            turn
          });
        }
        if (turn.status === "won" || turn.status === "lost" || turn.action === "game_over") {
          const answerName = options.fallbackAnswerName || turn.guess?.entityName || extractGuessName(turn.questionText) || state.finalAnswerName || state.pendingGuess?.entityName || "";
          state.result = {
            status: turn.status === "won" ? "won" : "lost",
            message: turn.questionText,
            answerName
          };
          state.pendingGuess = null;
          state.screen = "win";
          clearSavedGame();
        }
      }

      function labelForAnswer(answer) {
        return answer === "kind_of" ? "Kind Of" : answer === "yes" ? "Yes" : "No";
      }

      function extractGuessName(text) {
        return String(text || "").replace(/^Is it\s+/i, "").replace(/\?$/u, "").trim();
      }

      function speakTurn(turn) {
        speakText(turn?.spokenText || turn?.questionText || "");
      }

      function speakText(text) {
        if (!text || state.voiceMode === "off") return;
        try {
          cancelSpeech(false);
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 0.82;
          utterance.pitch = 0.42;
          utterance.volume = 1;
          utterance.lang = "en-US";
          if (state.voiceName) {
            const voice = speechSynthesis.getVoices().find((item) => item.name === state.voiceName);
            if (voice) utterance.voice = voice;
          }
          utterance.onstart = () => { state.isSpeaking = true; render(); };
          utterance.onend = () => {
            state.isSpeaking = false;
            render();
            if (state.voiceMode === "full" && state.screen === "game" && !state.pendingGuess && !state.result) {
              window.setTimeout(startListening, 500);
            }
          };
          utterance.onerror = () => { state.isSpeaking = false; render(); };
          speechSynthesis.speak(utterance);
        } catch {
          state.isSpeaking = false;
        }
      }

      function cancelSpeech(needsRender = true) {
        try { speechSynthesis?.cancel(); } catch {}
        state.isSpeaking = false;
        state.isListening = false;
        if (needsRender) render();
      }

      function toggleVoiceMode() {
        state.voiceMode = state.voiceMode === "off" ? "minimal" : state.voiceMode === "minimal" ? "full" : "off";
        try { localStorage.setItem("tars20q.voiceMode.v1", state.voiceMode); } catch {}
        if (state.voiceMode === "off") cancelSpeech(false);
        render();
      }

      function startListening() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) {
          state.error = "STT unclear: this browser does not support speech recognition. Use Y, K, or N.";
          render();
          return;
        }
        try {
          const recognition = new Recognition();
          recognition.lang = "en-US";
          recognition.interimResults = false;
          recognition.maxAlternatives = 1;
          state.isListening = true;
          render();
          recognition.onresult = (event) => {
            const text = event.results?.[0]?.[0]?.transcript?.toLowerCase() || "";
            state.isListening = false;
            const answer = parseVoiceAnswer(text);
            if (!answer) {
              state.error = "STT unclear. Say yes, kind of, or no.";
              render();
              return;
            }
            submitAnswer(answer);
          };
          recognition.onerror = (event) => {
            state.isListening = false;
            state.error = event.error === "not-allowed" ? "Microphone denied. Enable microphone access or use Y, K, or N." : "STT unclear. Use the answer buttons or keyboard shortcuts.";
            render();
          };
          recognition.onend = () => {
            state.isListening = false;
            render();
          };
          recognition.start();
        } catch {
          state.isListening = false;
          state.error = "Microphone denied or unavailable. Use Y, K, or N.";
          render();
        }
      }

      function parseVoiceAnswer(text) {
        if (/\b(yes|yeah|yep|correct)\b/.test(text)) return "yes";
        if (/\b(kind of|sort of|maybe|partly|somewhat)\b/.test(text)) return "kind_of";
        if (/\b(no|nope|negative|incorrect)\b/.test(text)) return "no";
        return null;
      }

      function readableError(error, fallback) {
        const raw = error?.message || error?.code || "";
        const message = String(raw).replace(/^FirebaseError:\s*/i, "").trim();
        const normalized = message.toLowerCase();
        if (normalized === "internal" || normalized === "functions/internal") return fallback || "TARS hit an API error. Try again.";
        if (normalized.includes("microphone") || normalized.includes("not-allowed")) return "Microphone denied. Enable microphone access or use the buttons.";
        if (normalized.includes("speech") || normalized.includes("stt")) return "STT unclear. Use Y, K, or N.";
        if (normalized.includes("contradiction")) return "Contradiction detected. TARS will re-ask the last uncertain point.";
        if (normalized.includes("network") || normalized.includes("fetch") || normalized.includes("unavailable")) return "Network error. Check the connection and try again.";
        return message || fallback || "TARS hit an API error. The page is still operational.";
      }

      function saveGame() {
        if (!state.gameId || state.result) return false;
        const savedAt = new Date();
        const game = {
          version: STORAGE_VERSION,
          savedAt: savedAt.toISOString(),
          expiresAt: new Date(savedAt.getTime() + SESSION_TTL_MS).toISOString(),
          gameId: state.gameId,
          sessionId: state.gameId,
          mode: state.mode,
          category: state.category,
          turn: state.turn,
          log: state.log,
          questionsLeft: questionsLeft(),
          currentQuestion: questionCount(),
          voiceMode: state.voiceMode,
          voiceName: state.voiceName,
          pendingGuess: state.pendingGuess,
          finalAnswerName: state.finalAnswerName,
          result: state.result
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
          return true;
        } catch {
          return false;
        }
      }

      function loadSavedGame() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const game = JSON.parse(raw);
          if (!game || game.version !== STORAGE_VERSION || typeof game.gameId !== "string" || !Array.isArray(game.log)) return null;
          if (Date.parse(game.expiresAt) <= Date.now()) {
            clearSavedGame();
            return null;
          }
          return game;
        } catch {
          clearSavedGame();
          return null;
        }
      }

      function clearSavedGame() {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
      }

      function timeSince(iso) {
        const minutes = Math.floor(Math.max(0, Date.now() - Date.parse(iso)) / 60000);
        if (minutes < 1) return "just now";
        if (minutes === 1) return "1 min ago";
        return `${minutes} min ago`;
      }

      function loadVoiceMode() {
        try {
          const mode = localStorage.getItem("tars20q.voiceMode.v1");
          return ["off", "minimal", "full"].includes(mode) ? mode : "minimal";
        } catch {
          return "minimal";
        }
      }

      function loadVoiceName() {
        try { return localStorage.getItem("tars20q.voiceName.v1") || undefined; } catch { return undefined; }
      }

      function saveVoiceName() {
        try {
          if (state.voiceName) localStorage.setItem("tars20q.voiceName.v1", state.voiceName);
          else localStorage.removeItem("tars20q.voiceName.v1");
        } catch {}
      }

      function exportLog() {
        const now = new Date();
        const lines = [
          "TARS 20 Questions Game Log",
          `Mode: ${modeLabel()}`,
          `Saved: ${now.toLocaleString()}`,
          `Question: ${questionCount()} of ${MAX_QUESTIONS}`,
          `Result: ${state.result?.status === "won" ? "TARS won" : "TARS lost"}`,
          `Answer: ${state.result?.answerName || "Unknown"}`,
          "",
          "Transcript:",
          ...state.log.map((entry) => `${entry.speaker === "tars" ? "TARS" : "Pilot"}: ${entry.text}`)
        ];
        const blob = new Blob([`${lines.join("\n")}\n`], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `tars-20-questions-${now.toISOString().slice(0, 10)}.txt`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function playAgain() {
        cancelSpeech(false);
        clearSavedGame();
        Object.assign(state, {
          screen: "start",
          category: null,
          gameId: null,
          turn: null,
          log: [],
          busy: false,
          error: null,
          savedGame: null,
          pendingGuess: null,
          revealFinalInput: false,
          finalAnswerName: "",
          result: null
        });
        render();
      }

      function icon(name) {
        const attrs = `width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"`;
        const paths = {
          ear: `<path d="M6 8.5a6 6 0 0 1 12 0c0 4.5-4 5.2-4 8.5a2 2 0 0 1-4 0"/><path d="M10 8.5a2 2 0 1 1 4 0c0 2-2 2.4-2 4"/>`,
          save: `<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/>`,
          rotate: `<path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/>`,
          trash: `<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>`,
          play: `<circle cx="12" cy="12" r="10"/><path d="m10 8 6 4-6 4V8Z"/>`,
          volume: `<path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>`,
          download: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>`
        };
        return `<svg ${attrs}>${paths[name] || ""}</svg>`;
      }

      window.addEventListener("keydown", (event) => {
        if (state.screen !== "game" || state.busy || state.pendingGuess || state.result) return;
        const tag = document.activeElement?.tagName;
        if (["INPUT", "TEXTAREA", "SELECT"].includes(tag)) return;
        const key = event.key.toLowerCase();
        if (key === "y") { event.preventDefault(); submitAnswer("yes"); }
        if (key === "k") { event.preventDefault(); submitAnswer("kind_of"); }
        if (key === "n") { event.preventDefault(); submitAnswer("no"); }
      });

      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_KEY && state.screen === "start") {
          state.savedGame = loadSavedGame();
          render();
        }
      });

      function loadVoices() {
        try {
          state.voices = speechSynthesis.getVoices();
          if (state.screen === "start") render();
        } catch {}
      }

      try {
        loadVoices();
        speechSynthesis.addEventListener("voiceschanged", loadVoices);
      } catch {}

      render();
    </script>
  </body>
</html>
